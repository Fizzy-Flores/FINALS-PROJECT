<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 1rem;
            line-height: 1.6;
            color: #222;
        }
        header {
            margin-bottom: 2rem;
        }
        h1 {
            margin-bottom: 0.5rem;
            font-size: 2.2rem;
        }
        .details {
            margin-top: 1rem;
            padding: 1rem;
            background: #f7f7f7;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .details p {
            margin: 0.4rem 0;
        }
        .label {
            font-weight: 700;
        }
    </style>
</head>
<body>
    <header>
        <h1>Artist Hub</h1>
        <p>Your local frontend website is running. The server address is shown below.</p>
    </header>
    <section class="details">
        <p><span class="label">Website Name:</span> Artist Hub</p>
        <p><span class="label">Current URL:</span> <span id="current-url"></span></p>
        <p><span class="label">Host:</span> <span id="current-host"></span></p>
    </section>
    <script>
        document.getElementById('current-url').textContent = window.location.href;
        document.getElementById('current-host').textContent = window.location.host;
    </script>
</body>
</html>
